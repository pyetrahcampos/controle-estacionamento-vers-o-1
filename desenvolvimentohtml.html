<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sistema de Gestão de Vagas</title>
  <link rel="stylesheet" href="desenvolvimento.web.css">
</head>
<body>

  <header class="main-header">
    <h1>Controle de Estacionamento</h1>
  </header>

  <main class="container">
    <div class="action-bar">
      <button class="btn btn-primary" id="btnOpenModal">Nova Reserva</button>
    </div>

    <div class="table-responsive">
      <table id="EstacionamentoTable">
        <thead>
          <tr>
            <th>Vaga</th>
            <th>Placa</th>
            <th>Residente</th>
            <th>Bloco/Apto</th>
            <th>Veículo</th>
            <th>Status</th>
            <th>Gerenciar</th>
          </tr>
        </thead>
        <tbody id="EstacionamentoData"></tbody>
      </table>
    </div>
  </main>

  <div id="modalEstacionamento" class="modal-overlay">
    <div class="modal-card">
      <div class="modal-header">
        <h2 id="modalTitle">Registrar Veículo</h2>
        <button class="btn-close" id="btnCloseModal">&times;</button>
      </div>

      <form id="EstacionamentoForm">
        <div class="modal-body">
          <div class="input-group">
            <label for="placa">Placa do Veículo</label>
            <input type="text" id="placa" placeholder="AAA-0000" required>
          </div>
          <div class="input-group">
            <label for="proprietario">Nome do Residente</label>
            <input type="text" id="proprietario" placeholder="Nome Completo" required>
          </div>
          <div class="row">
            <div class="input-group">
              <label for="bloco">Bloco</label>
              <input type="text" id="bloco" placeholder="Ex: B">
            </div>
            <div class="input-group">
              <label for="apartamento">Apartamento</label>
              <input type="text" id="apartamento" placeholder="Ex: 102">
            </div>
          </div>
          <div class="row">
            <div class="input-group">
              <label for="modelo">Modelo</label>
              <input type="text" id="modelo" placeholder="Ex: Civic">
            </div>
            <div class="input-group">
              <label for="cor">Cor</label>
              <input type="text" id="cor" placeholder="Ex: Prata">
            </div>
          </div>
          <div class="input-group">
            <label for="vaga">Número da Vaga</label>
            <input type="number" id="vaga" placeholder="00" required>
          </div>
        </div>

        <div class="modal-footer">
          <button type="submit" class="btn btn-success" id="btnSubmit">Confirmar Reserva</button>
        </div>
      </form>
    </div>
  </div>

  <script src="desenvolvimento.web.js"></script>
</body>
</html>
